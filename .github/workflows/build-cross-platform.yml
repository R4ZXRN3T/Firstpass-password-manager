name: Build cross-platform

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-latest
            arch: aarch64
          - os: macos-latest
            arch: x86_64
          - os: macos-latest
            arch: aarch64
          - os: windows-latest
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '26'
          architecture: ${{ matrix.arch }}

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew && echo $(uname -m)

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: ./gradlew copyJarsToFinal makeJlinkPackage

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew copyJarsToFinal makeJlinkPackage

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: .\gradlew.bat copyJarsToFinal makeJlinkPackage

      - name: Build installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install innosetup -y
          $iss = 'installer files\\Firstpass.iss'
          Write-Host "Running Inno Setup compiler on $iss"
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' $iss

      - name: List final directory
        run: |
          ls -la final || true

      - name: Upload final artifacts
        uses: actions/upload-artifact@v7
        with:
          name: final-${{ matrix.os }}
          path: |
            final/**
            build/**/construo/**

  release:
    name: Create release with built artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get project version
        id: get_version
        run: |
          echo "VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}-build-${{ github.run_number }}
          name: Firstpass ${{ env.VERSION }} (build ${{ github.run_number }})
          files: artifacts/**/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
