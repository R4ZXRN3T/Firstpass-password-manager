name: Build cross-platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: Linux
            runner: ubuntu-latest
            arch: x86_64
          - os: Linux
            runner: ubuntu-24.04-arm
            arch: aarch64
          - os: macOS
            runner: macos-26-intel
            arch: x86_64
          - os: macOS
            runner: macos-latest
            arch: aarch64
          - os: Windows
            runner: windows-latest
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '26'
          architecture: ${{ matrix.arch }}

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew && echo $(uname -m)

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: ./gradlew makeJlinkPackage

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew makeMacApp

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: .\gradlew.bat makeJlinkPackage

      - name: Build installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install innosetup -y
          $iss = 'installer files\\Firstpass.iss'
          Write-Host "Running Inno Setup compiler on $iss"
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' $iss

      - name: Upload final artifacts
        uses: actions/upload-artifact@v7
        with:
          name: final-${{ matrix.os }}-${{ matrix.arch }}.zip
          path: |
            final/**