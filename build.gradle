plugins {
	id 'java'
	id 'application'
	id 'com.gradleup.shadow' version '9.4.1'
}

import com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar


repositories {
	mavenCentral()
}

java.sourceCompatibility = 25
java.targetCompatibility = 25

group = project.findProperty('group') ?: 'org.R4ZXRN3T.firstpass'
version = project.findProperty('version') ?: '1.0.0'
project.description = project.findProperty('description') ?: 'Firstpass Password Manager'

// --- project metadata (single source of truth) ---
ext.meta = [
		name       : project.findProperty('name') ?: 'Firstpass Password Manager',
		homepage   : project.findProperty('homepage') ?: 'https://github.com/R4ZXRN3T/Firstpass-password-manager',
		license    : project.findProperty('license') ?: 'MIT',
		authors    : project.findProperty('authors') ?: 'Unknown',
		vendor     : project.findProperty('vendor') ?: project.findProperty('authors') ?: 'Unknown',
		buildNumber: project.findProperty('buildNumber') ?: System.getenv('GITHUB_RUN_NUMBER') ?: 'local'
]

// Control whether jars include the custom manifest attributes.
// Default to true for local dev; CI should pass -PincludeManifest=false to omit custom attributes.
def includeJarManifest = project.hasProperty('includeManifest') ? project.property('includeManifest').toString().toBoolean() : true

dependencies {
	implementation 'org.json:json:20251224'
	implementation 'com.formdev:flatlaf:3.7.1'
	implementation 'de.mkammerer:argon2-jvm:2.12'
	implementation 'net.java.dev.jna:jna:5.18.1'

	testImplementation 'org.junit.jupiter:junit-jupiter:6.0.3'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher:6.0.3'
}

application {
	mainClass = 'org.R4ZXRN3T.firstpass.Main'
}

def _sysJavaVer = System.getProperty('java.version') ?: '0'
def _sysJavaMajor = _sysJavaVer.tokenize('.')[0].toInteger()
if (_sysJavaMajor < 25) {
    throw new GradleException("JDK 25 or greater is required for jlink image creation. Detected Java version: ${_sysJavaVer}")
}

tasks.named('jar') {
	enabled = false
}

// Make the assemble lifecycle create the shadow jar
tasks.named('assemble') {
	dependsOn tasks.named('shadowJar')
}

tasks.named('startScripts') {
	dependsOn tasks.named('shadowJar')
}
tasks.named('distTar') {
	dependsOn tasks.named('shadowJar')
}
tasks.named('distZip') {
	dependsOn tasks.named('shadowJar')
}

tasks.named('shadowJar') {
	archiveClassifier.set('')

	exclude('assets/**')

	if (includeJarManifest) {
		manifest {
			attributes(
					'Main-Class': 'org.R4ZXRN3T.firstpass.Main',
					'Implementation-Title': project.name,
					'Implementation-Version': project.version,
					'Implementation-Vendor': meta.vendor,
					'Implementation-URL': meta.homepage
			)
		}
	}
}

tasks.register('portableJar', ShadowJar) {
	// produce a filename like Firstpass_portable.jar (underscore separator)
	// instead of the default baseName-<classifier>.jar which gave you "-_portable"
	archiveClassifier.set('portable')
	archiveFileName.set(provider { "${archiveBaseName.get()}_portable.jar" })

	from sourceSets.main.output

	configurations = [project.configurations.runtimeClasspath]

	// explicitly include assets (normally included anyway if in resources)
	from('assets') {
		into 'assets'
	}

	if (includeJarManifest) {
		manifest {
			attributes(
					'Main-Class': 'org.R4ZXRN3T.firstpass.Main',
					'Implementation-Title': project.name,
					'Implementation-Version': project.version,
					'Implementation-Vendor': meta.vendor,
					'Implementation-URL': meta.homepage
			)
		}
	}
}

// Copy the main shadow jar into the project's `final/` directory
tasks.register('copyJarToFinal', Copy) {
	dependsOn tasks.named('shadowJar')

	// ensure the directory exists (Copy would create it, but be explicit)
	doFirst {
		file('final').mkdirs()
	}

	from(tasks.named('shadowJar').flatMap { it.archiveFile })
	into 'final'
}

// Copy the portable jar (classifier 'portable') into `final/`
tasks.register('copyPortableJarToFinal', Copy) {
	dependsOn tasks.named('portableJar')

	doFirst {
		file('final').mkdirs()
	}

	from(tasks.named('portableJar').flatMap { it.archiveFile })
	into 'final'
}

// Convenience task that copies both jars
tasks.register('copyJarsToFinal') {
	dependsOn tasks.named('copyJarToFinal')
	dependsOn tasks.named('copyPortableJarToFinal')
}

// Task: create a jlink runtime image using the system jlink (no JDK downloads).
// This is registered as its own task so it can be invoked independently.
tasks.register('jlinkImage') {
	dependsOn tasks.named('shadowJar')
	// declare outputs so Gradle can reason about up-to-date/caching
	def _imageDirPath = "${buildDir}/jlink/image"
	outputs.dir(_imageDirPath)
	doLast {
		def host = org.gradle.internal.os.OperatingSystem.current()
		def modules = 'java.base,java.desktop,java.logging'
		def imageDir = file(_imageDirPath)
		if (imageDir.exists()) imageDir.deleteDir()
		// Do NOT create the output directory before invoking jlink: jlink fails
		// if the output directory already exists. jlink will create the directory
		// on success.

		// Invoke jlink using a Java ProcessBuilder to avoid Gradle exec resolution issues
		def jlinkCmd = ['jlink', '--add-modules', modules, '--output', imageDir.absolutePath, '--strip-debug', '--no-header-files', '--no-man-pages', '--compress=0']
		logger.lifecycle("Running: ${jlinkCmd.join(' ')}")
		def pb = new ProcessBuilder(jlinkCmd)
		pb.redirectErrorStream(true)
		pb.directory(project.projectDir)
		def proc = pb.start()
		proc.inputStream.withReader { r -> r.eachLine { logger.lifecycle(it) } }
		def rc = proc.waitFor()
		if (rc != 0) {
			throw new GradleException("jlink failed with exit code ${rc}")
		}
	}
}

tasks.register('makeJlinkPackage') {
	dependsOn tasks.named('shadowJar')
	// Ensure the runtime image is available
	dependsOn tasks.named('jlinkImage')

	doLast {
		def host = org.gradle.internal.os.OperatingSystem.current()
		def hostArch = (System.getProperty('os.arch') ?: '').toLowerCase()

		def osLabel
		def archLabel
		if (host.isLinux()) osLabel = 'Linux'
		else if (host.isMacOsX()) osLabel = 'MacOS'
		else if (host.isWindows()) osLabel = 'Windows'
		else osLabel = 'Unknown'

		if (hostArch.contains('aarch64') || hostArch.contains('arm')) archLabel = 'aarch64'
		else archLabel = 'x86_64'

		def outName = "Firstpass-${project.version}-${osLabel}-${archLabel}.zip"
		def outDir = file('final')
		outDir.mkdirs()

		def tmpDir = file("${buildDir}/tmp/jlink-package")
		if (tmpDir.exists()) tmpDir.deleteDir()
		tmpDir.mkdirs()

		// Prefer packaging the jlink image (if present) so the final artifact is
		// runnable without an external JDK. Fall back to jars if the image is missing.
		def imageDir = file("${buildDir}/jlink/image")
		if (imageDir.exists()) {
			// Packaging layout: root contains the jars and launchers, assets/ alongside, and jre/ for runtime
			// Copy the main shadow jar and portable jar into app/
			def appOut = new File(tmpDir, 'app')
			appOut.mkdirs()
			copy { from(tasks.named('shadowJar').flatMap { it.archiveFile }); into appOut }
			copy { from(tasks.named('portableJar').flatMap { it.archiveFile }); into appOut }

			// Copy assets into assets/
			def assetsSrc = file('assets')
			if (assetsSrc.exists()) {
				copy { from assetsSrc; into new File(tmpDir, 'assets') }
			}

			// Place the jlink runtime image under jre/
			def jreOut = new File(tmpDir, 'jre')
			copy { from imageDir; into jreOut }

			// Create launchers at the package root that invoke jre/bin/java -jar app/<jar>
			def shadowFile = tasks.named('shadowJar').get().archiveFile.get().asFile
			if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
				def bat = new File(tmpDir, 'firstpass.bat')
				bat.text = "@echo off\r\n\"%~dp0\\jre\\bin\\java\" -jar \"%~dp0\\app\\${shadowFile.name}\" %*\r\n"
			} else {
				def sh = new File(tmpDir, 'firstpass')
				sh.text = '#!/usr/bin/env sh\n' +
						'exec "$(dirname \"$0\")/jre/bin/java" -jar "$(dirname \"$0\")/app/' + shadowFile.name + '" "$@"\n'
				sh.setExecutable(true)
			}
		} else {
			// Fallback: place jars and assets at package root
			// Fallback: place jars into app/ at package root
			def appOut = new File(tmpDir, 'app')
			appOut.mkdirs()
			copy {
				from(tasks.named('shadowJar').flatMap { it.archiveFile })
				into appOut
			}
			def assetsSrc = file('assets')
			if (assetsSrc.exists()) {
				copy { from assetsSrc; into new File(tmpDir, 'assets') }
			}
			// Create simple launchers at root that use system java to run app/<jar> (fallback)
			def shadowFile = tasks.named('shadowJar').get().archiveFile.get().asFile
			if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
				def bat = new File(tmpDir, 'firstpass.bat')
				bat.text = "@echo off\r\njava -jar \"%~dp0\\app\\${shadowFile.name}\" %*\r\n"
			} else {
				def sh = new File(tmpDir, 'firstpass')
				sh.text = '#!/usr/bin/env sh\n' +
						'exec java -jar "$(dirname \"$0\")/app/' + shadowFile.name + '" "$@"\n'
				sh.setExecutable(true)
			}
		}

		def finalDest = new File(outDir, outName.replaceAll(/\.zip$/, ''))
		if (finalDest.exists()) finalDest.deleteDir()
		finalDest.mkdirs()

		copy { from tmpDir; into finalDest }

		println "Created packaged artifact directory: ${finalDest}"
	}
}
