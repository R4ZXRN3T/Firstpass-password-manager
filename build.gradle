plugins {
	id 'java'
	id 'application'
	id 'org.gradlex.extra-java-module-info' version '1.14'
	id 'io.github.fourlastor.construo' version '2.1.0'
}

import io.github.fourlastor.construo.Target

group = 'org.R4ZXRN3T'
version = '2.1.3'

def mainModuleName = 'org.R4ZXRN3T.firstpass'
def mainClassName = 'org.R4ZXRN3T.firstpass.Main'
def appJarName = 'Firstpass.jar'
def portableJarName = 'Firstpass_portable.jar'
def osNameLower = System.getProperty('os.name').toLowerCase()
def isWindows = osNameLower.contains('windows')
def isLinux   = osNameLower.contains('linux')
def isMacOs   = osNameLower.contains('mac')
def archLower = System.getProperty('os.arch').toLowerCase()
def isArm64   = archLower.contains('aarch64') || archLower.contains('arm64')
def finalDir = layout.projectDirectory.dir('final')
def installerDir = layout.projectDirectory.dir('installer files')
def construoDistDir = finalDir.dir('construo')
def installerConstruoStageDir = layout.buildDirectory.dir('tmp/installer-construo/windows-x86_64')
def use7zipForConstruoZips = providers.gradleProperty('use7zip').map { it.toBoolean() }.orElse(false)
def manifestAttributes = [
		'Main-Class'            : mainClassName,
		'Implementation-Title'  : project.name,
		'Implementation-Version': project.version
]

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
	modularity.inferModulePath = true
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.json:json:20251224'
	implementation 'com.formdev:flatlaf:3.7.1'
	implementation 'de.mkammerer:argon2-jvm:2.12'
	implementation 'net.java.dev.jna:jna:5.18.1'

	testImplementation 'org.junit.jupiter:junit-jupiter:6.0.3'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher:6.0.3'
}

application {
	mainModule = mainModuleName
	mainClass = mainClassName
}

construo {
	name.set('Firstpass')
	humanName.set('Firstpass Password Manager')
	mainClass.set(mainClassName)
	jarTask.set('construoJar')
	outputDir.set(construoDistDir.asFile)

	targets.configure {
		register('linuxX64', Target.Linux) {
			architecture.set(Target.Architecture.X86_64)
			jdkUrl.set('https://github.com/adoptium/temurin25-binaries/releases/download/jdk-25.0.2%2B10/OpenJDK25U-jdk_x64_linux_hotspot_25.0.2_10.tar.gz')
		}
		register('linuxArm64', Target.Linux) {
			architecture.set(Target.Architecture.AARCH64)
			jdkUrl.set('https://github.com/adoptium/temurin25-binaries/releases/download/jdk-25.0.2%2B10/OpenJDK25U-jdk_aarch64_linux_hotspot_25.0.2_10.tar.gz')
		}
		register('windowsX64', Target.Windows) {
			architecture.set(Target.Architecture.X86_64)
			jdkUrl.set('https://github.com/adoptium/temurin25-binaries/releases/download/jdk-25.0.2%2B10/OpenJDK25U-jdk_x64_windows_hotspot_25.0.2_10.zip')
			icon.set(file('assets/firstpass_icon.png'))
		}
		register ('macOsX64', Target.MacOs) {
			architecture.set(Target.Architecture.X86_64)
			jdkUrl.set('https://github.com/adoptium/temurin25-binaries/releases/download/jdk-25.0.2%2B10/OpenJDK25U-jdk_x64_mac_hotspot_25.0.2_10.tar.gz')
			identifier.set('org.r4zxrnt.firstpass')
			buildNumber.set(project.version.toString())
			versionNumber.set(project.version.toString())
		}
		register('macOsArm64', Target.MacOs) {
			architecture.set(Target.Architecture.AARCH64)
			jdkUrl.set('https://github.com/adoptium/temurin25-binaries/releases/download/jdk-25.0.2%2B10/OpenJDK25U-jdk_aarch64_mac_hotspot_25.0.2_10.tar.gz')
			identifier.set('org.r4zxrnt.firstpass')
			buildNumber.set(project.version.toString())
			versionNumber.set(project.version.toString())
		}
	}
}

tasks.withType(JavaCompile).configureEach {
	options.encoding = 'UTF-8'
	options.release = 25
}

tasks.withType(Jar).configureEach {
	// Keep archive contents deterministic across machines/builds.
	preserveFileTimestamps = false
	reproducibleFileOrder = true
}

tasks.test {
	useJUnitPlatform()
}

// ─── JAR tasks ────────────────────────────────────────────────────────────────

def configureFatJar = { jarTask, boolean includeAssets ->
	jarTask.duplicatesStrategy = DuplicatesStrategy.EXCLUDE
	jarTask.manifest {
		attributes(manifestAttributes)
	}
	jarTask.from(sourceSets.main.output)
	jarTask.from({
		configurations.runtimeClasspath.collect { dependency ->
			dependency.isDirectory() ? dependency : zipTree(dependency)
		}
	}) {
		exclude 'META-INF/*.SF', 'META-INF/*.DSA', 'META-INF/*.RSA'
	}
	if (includeAssets) {
		jarTask.from('assets') {
			into 'assets'
		}
	}
}

tasks.named('jar').configure {
	description = 'Builds the modular application JAR (used as module-path input for tooling).'
	archiveFileName = 'Firstpass_modular.jar'
	manifest {
		attributes(manifestAttributes)
	}
}

tasks.register('fatJar', Jar) {
	group = 'build'
	description = 'Builds the standard runnable fat JAR without bundled assets.'
	archiveFileName = appJarName
	configureFatJar(delegate, false)
}

tasks.register('portableJar', Jar) {
	group = 'build'
	description = 'Builds the portable runnable JAR with the assets folder included.'
	archiveFileName = portableJarName
	configureFatJar(delegate, true)
}

tasks.register('construoJar', Jar) {
	group = 'build'
	description = 'Builds a non-modular fat JAR for Construo runtime image generation.'
	archiveFileName = 'Firstpass_construo.jar'
	configureFatJar(delegate, false)
	// Construo runs jdeps without extra module-path dependencies; remove module metadata.
	exclude 'module-info.class'
}

tasks.register('copyJarToRoot') {
	description = 'Copies Firstpass.jar to ./final for downstream packaging tasks.'
	dependsOn tasks.named('fatJar')
	def fatJarFile = tasks.named('fatJar', Jar).flatMap { it.archiveFile }
	inputs.file(fatJarFile)
	outputs.file(finalDir.file(appJarName))
	doLast {
		copy {
			from(fatJarFile)
			into(finalDir)
		}
	}
}

tasks.register('copyPortableJarToRoot') {
	description = 'Copies Firstpass_portable.jar to ./final.'
	dependsOn tasks.named('portableJar')
	def portableJarFile = tasks.named('portableJar', Jar).flatMap { it.archiveFile }
	inputs.file(portableJarFile)
	outputs.file(finalDir.file(portableJarName))
	doLast {
		copy {
			from(portableJarFile)
			into(finalDir)
		}
	}
}


// ─── Windows packaging tasks ──────────────────────────────────────────────────
// Requires Inno Setup to be installed and on PATH.

def commandExists = { String command ->
	def process = new ProcessBuilder('cmd', '/c', "where ${command}")
			.redirectErrorStream(true)
			.start()
	process.inputStream.text
	process.waitFor() == 0
}

def construoReleaseZipName = { String osName, String arch ->
	"Firstpass-${project.version}-${osName}-${arch}.zip"
}

def rawConstruoZipByTarget = { String targetName ->
	file("${construoDistDir.asFile}/${project.name}-${targetName}.zip")
}


tasks.register('stageConstruoWindowsForInstaller') {
	group = 'distribution'
	description = 'Extracts the Construo Windows bundle for the installer input stage.'
	dependsOn tasks.named('packageConstruoTargets')

	def zipProvider = provider { file("${construoDistDir.asFile}/${construoReleaseZipName('Windows', 'x86_64')}") }
	inputs.file(zipProvider)
	outputs.dir(installerConstruoStageDir)

	doLast {
		def sourceZip = zipProvider.get()
		def stageDir = installerConstruoStageDir.get().asFile
		delete(stageDir)
		def has7zip = commandExists('7z')
		def use7zipExtract = use7zipForConstruoZips.get() || has7zip

		if (use7zipForConstruoZips.get() && !has7zip) {
				throw new GradleException("7z not found on PATH. Install 7-Zip or run without -Puse7zip=true.")
		}

		if (use7zipExtract) {
			def extractProcess = new ProcessBuilder('7z', 'x', '-y', sourceZip.absolutePath, "-o${stageDir.absolutePath}")
					.redirectErrorStream(true)
					.start()
			def extractOutput = extractProcess.inputStream.text
			if (extractProcess.waitFor() != 0) {
				throw new GradleException("7-Zip extract failed for installer staging: ${extractOutput}")
			}
		} else {
			copy {
				from zipTree(sourceZip)
				into stageDir
			}
		}
	}
}

// Packages the Construo Windows bundle (+ project assets) into a Windows installer via Inno Setup.
tasks.register('createInstaller', Exec) {
	group = 'distribution'
	description = 'Creates the Windows installer (Firstpass_setup.exe) from Construo Windows binaries.'
	dependsOn tasks.named('stageConstruoWindowsForInstaller')
	onlyIf { isWindows && commandExists('iscc') }

	workingDir installerDir
	commandLine 'iscc', "/DMyAppVersion=${project.version}", 'Firstpass.iss'
}

// Normalizes (rename + inject assets) a single Construo zip in-place.
// cfg = [target: <construoTargetName>, os: <'Windows'|'Linux'|'macOS'>, arch: <'x86_64'|'aarch64'>]
def normalizeSingleConstruoTarget = { Map cfg ->
	def has7zip = commandExists('7z')
	if (use7zipForConstruoZips.get() && !has7zip) {
		throw new GradleException("7z not found on PATH. Install 7-Zip or run without -Puse7zip=true.")
	}

	def sourceZip    = rawConstruoZipByTarget(cfg.target)
	def normalizedZip = file("${construoDistDir.asFile}/${construoReleaseZipName(cfg.os, cfg.arch)}")
	def inputZip     = sourceZip.exists() ? sourceZip : normalizedZip
	if (!inputZip.exists()) {
		throw new GradleException("Missing Construo artifact: ${sourceZip}")
	}

	def tempExtractDir = layout.buildDirectory.dir("tmp/construo-repack/${cfg.target}").get().asFile
	delete(tempExtractDir)

	if (has7zip) {
		def proc = new ProcessBuilder('7z', 'x', '-y', inputZip.absolutePath, "-o${tempExtractDir.absolutePath}")
				.redirectErrorStream(true).start()
		def out = proc.inputStream.text
		if (proc.waitFor() != 0) throw new GradleException("7-Zip extract failed for ${cfg.target}: ${out}")
	} else {
		copy { from zipTree(inputZip); into tempExtractDir }
	}

	def assetsTargetDir
	if (cfg.os == 'macOS') {
		def expectedAppDir = file("${tempExtractDir}/Firstpass Password Manager.app")
		def macAppDir = expectedAppDir.exists() ? expectedAppDir : fileTree(tempExtractDir).matching {
			include '**/*.app'
		}.files.find { it.isDirectory() }
		if (macAppDir == null) throw new GradleException("Could not find macOS .app bundle in ${inputZip.name}")
		assetsTargetDir = file("${macAppDir}/Contents/MacOS/assets")
	} else {
		assetsTargetDir = file("${tempExtractDir}/assets")
	}
	copy { from('assets'); into assetsTargetDir }

	delete(normalizedZip)
	if (use7zipForConstruoZips.get()) {
		def proc = new ProcessBuilder('7z', 'a', '-tzip', '-mm=LZMA', '-mx=9', '-md=3840m', '-mfb=273', '-mmt=3',
				normalizedZip.absolutePath, '.').directory(tempExtractDir).redirectErrorStream(true).start()
		def out = proc.inputStream.text
		if (proc.waitFor() != 0) throw new GradleException("7-Zip repack failed for ${cfg.target}: ${out}")
	} else {
		ant.zip(destfile: normalizedZip, basedir: tempExtractDir)
	}

	if (!sourceZip.name.equalsIgnoreCase(normalizedZip.name)) delete(sourceZip)
}

tasks.register('normalizeConstruoZips') {
	group = 'distribution'
	description = 'Creates versioned Construo zip names and optionally repacks with 7-Zip.'
	dependsOn tasks.named('packageLinuxX64')
	dependsOn tasks.named('packageLinuxArm64')
	dependsOn tasks.named('packageWindowsX64')
	dependsOn tasks.named('packageMacOsX64')
	dependsOn tasks.named('packageMacOsArm64')

	doLast {
		[
			[target: 'windowsX64',  os: 'Windows', arch: 'x86_64'],
			[target: 'linuxX64',    os: 'Linux',   arch: 'x86_64'],
			[target: 'linuxArm64',  os: 'Linux',   arch: 'aarch64'],
			[target: 'macOsX64',    os: 'macOS',   arch: 'x86_64'],
			[target: 'macOsArm64',  os: 'macOS',   arch: 'aarch64'],
		].each { normalizeSingleConstruoTarget(it) }
	}
}

tasks.register('packageConstruoTargets') {
	group = 'distribution'
	description = 'Builds all Construo targets and writes normalized release zip names to ./final/construo.'
	dependsOn tasks.named('normalizeConstruoZips')
}

// Builds only the artifacts relevant to the OS Gradle is currently running on.
// Produces: Firstpass.jar, Firstpass_portable.jar, and the platform zip in ./final/construo/.
tasks.register('packageCurrentOs') {
	group = 'distribution'
	description = 'Builds JAR artifacts and the Construo package for the current OS only (faster than packageAll).'
	dependsOn tasks.named('copyJarToRoot')
	dependsOn tasks.named('copyPortableJarToRoot')

	if (isWindows) {
		dependsOn tasks.named('packageWindowsX64')
	} else if (isLinux) {
		dependsOn isArm64 ? tasks.named('packageLinuxArm64') : tasks.named('packageLinuxX64')
	} else if (isMacOs) {
		dependsOn isArm64 ? tasks.named('packageMacOsArm64') : tasks.named('packageMacOsX64')
	}

	doLast {
		def cfg = isWindows       ? [target: 'windowsX64',  os: 'Windows', arch: 'x86_64']
				: (isLinux && isArm64)  ? [target: 'linuxArm64',  os: 'Linux',   arch: 'aarch64']
				: isLinux               ? [target: 'linuxX64',    os: 'Linux',   arch: 'x86_64']
				: (isMacOs && isArm64)  ? [target: 'macOsArm64',  os: 'macOS',   arch: 'aarch64']
				: isMacOs               ? [target: 'macOsX64',    os: 'macOS',   arch: 'x86_64']
				: null
		if (cfg) normalizeSingleConstruoTarget(cfg)
	}
}

tasks.register('packageAll') {
	group = 'distribution'
	description = 'Builds all configured distribution artifacts into ./final.'
	doFirst {
		delete file("${projectDir}/final/installer-construo")
	}
	dependsOn tasks.named('copyJarToRoot')
	dependsOn tasks.named('copyPortableJarToRoot')
	if (tasks.findByName('packageConstruoTargets') != null) {
		dependsOn tasks.named('packageConstruoTargets')
	}
	if (isWindows) {
		dependsOn tasks.named('createInstaller')
	}
}

tasks.register('doAll') {
	dependsOn tasks.named('clean')
	dependsOn tasks.named('packageAll')
}

// ─── Lifecycle wiring ─────────────────────────────────────────────────────────
// `build` creates the standard runnable JAR only.
// Portable JAR, platform packages, and the Windows installer are opt-in via their dedicated tasks.

tasks.named('clean') {
	delete file("${projectDir}/final")
	delete layout.buildDirectory.dir('tmp/installer-construo').get().asFile
	delete layout.buildDirectory.dir('tmp/construo-repack').get().asFile
}
